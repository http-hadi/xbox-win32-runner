name: Build (MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pefile (for PE scanner tests)
        run: pip install pefile

      - name: Verify PE scanner works
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          python tools/test_pe_scanner.py

      - name: Create test certificate for signing
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=XboxWin32RunnerTest" -KeyUsage DigitalSignature -FriendlyName "Xbox Win32 Runner Test Cert" -CertStoreLocation "Cert:\CurrentUser\My" -KeyExportPolicy Exportable -KeyAlgorithm RSA -KeyLength 2048 -NotAfter (Get-Date).AddYears(1)
          $pwd = ConvertTo-SecureString -String "Test1234!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "XboxWin32RunnerTest.pfx" -Password $pwd
          Write-Host "Certificate created: $($cert.Thumbprint)"

      - name: Create solution file
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          # VS needs a .sln to build a .vcxproj. Create a minimal one.
          $slnContent = @"
          Microsoft Visual Studio Solution File, Format Version 12.00
          # Visual Studio Version 17
          VisualStudioVersion = 17.0.31903.59
          MinimumVisualStudioVersion = 10.0.40219.1
          Project("{8BC9CEB8-8B4A-11D0-8D11-00A0C91BC942}") = "XboxWin32Runner", "XboxWin32Runner.vcxproj", "{00000000-0000-0000-0000-000000000001}"
          EndProject
          Global
            GlobalSection(SolutionConfigurationPlatforms) = preSolution
              Debug|x64 = Debug|x64
              Release|x64 = Release|x64
            EndGlobalSection
            GlobalSection(ProjectConfigurationPlatforms) = postSolution
              {00000000-0000-0000-0000-000000000001}.Debug|x64.ActiveCfg = Debug|x64
              {00000000-0000-0000-0000-000000000001}.Debug|x64.Build.0 = Debug|x64
              {00000000-0000-0000-0000-000000000001}.Release|x64.ActiveCfg = Release|x64
              {00000000-0000-0000-0000-000000000001}.Release|x64.Build.0 = Release|x64
            EndGlobalSection
          EndGlobal
          "@
          Set-Content -Path "XboxWin32Runner.sln" -Value $slnContent -Encoding UTF8

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          nuget restore XboxWin32Runner.sln 2>&1 | Out-Null
          Write-Host "NuGet restore complete"

      - name: Generate properly-sized PNG assets
        shell: pwsh
        run: |
          $assetsDir = "${{ github.workspace }}\uwp-shell\Assets"
          if (!(Test-Path $assetsDir)) { New-Item -ItemType Directory -Path $assetsDir -Force }
          Add-Type -AssemblyName System.Drawing
          $sizes = @{
            "Square150x150Logo.png" = @(150, 150)
            "Square44x44Logo.png" = @(44, 44)
            "Wide310x150Logo.png" = @(310, 150)
            "StoreLogo.png" = @(50, 50)
            "SplashScreen.png" = @(620, 300)
            "LockScreenLogo.png" = @(24, 24)
          }
          foreach ($name in $sizes.Keys) {
            $w = $sizes[$name][0]
            $h = $sizes[$name][1]
            $path = Join-Path $assetsDir $name
            $bmp = New-Object System.Drawing.Bitmap($w, $h)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::Black)
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose()
            $bmp.Dispose()
            $info = [System.Drawing.Image]::FromFile($path)
            Write-Host "Created $name ($w x $h) — actual: $($info.Width) x $($info.Height)"
            $info.Dispose()
          }

      - name: Build (Debug x64)
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          msbuild XboxWin32Runner.vcxproj /p:Configuration=Debug /p:Platform=x64 /m /v:minimal 2>&1 | Tee-Object -FilePath build_debug.log
          $exitCode = $LASTEXITCODE
          Write-Host "MSBuild exit code: $exitCode"
          Get-Content build_debug.log -Tail 80
          exit $exitCode

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: uwp-shell/build_debug.log

      - name: Build runtime test
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          # Compile the runtime test as a console app (links against real Win32, not UWP)
          # This tests which APIs actually WORK at runtime, not just compile
          cl /std:c++17 /EHsc /Fe:runtime_test.exe test\runtime_test.cpp /I shims /I winheaders /include:shims\CommonPre.h /D_MSC_VER /link kernel32.lib user32.lib advapi32.lib d3d11.lib dxgi.lib xinput.lib ws2_32.lib winmm.lib ole32.lib
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Failed to compile runtime test"
            exit 1
          }
          Write-Host "Runtime test compiled successfully"

      - name: Run runtime test
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          .\runtime_test.exe 2>&1 | Tee-Object -FilePath runtime_test_output.txt
          Write-Host "Runtime test exit code: $LASTEXITCODE"

      - name: Upload runtime test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-test-results
          path: |
            runtime_test_output.txt
            runtime_test_results.txt

      - name: Upload appx on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: XboxWin32Runner-appx
          path: |
            uwp-shell/x64/Debug/XboxWin32Runner.appx
            uwp-shell/x64/Debug/XboxWin32Runner.exe
