name: Build (MSVC)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pefile (for PE scanner tests)
        run: pip install pefile

      - name: Verify PE scanner works
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          python tools/test_pe_scanner.py

      - name: Create test certificate for signing
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          # Create a self-signed cert with ALL required extensions for code signing
          # UWP requires: Basic Constraints (CA=false), Key Usage (DigitalSignature),
          # Extended Key Usage (Code Signing), and Subject Key Identifier
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=XboxWin32RunnerTest" `
            -KeyUsage DigitalSignature `
            -KeyUsageProperty Sign `
            -FriendlyName "Xbox Win32 Runner Test Cert" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -KeyExportPolicy Exportable `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -NotAfter (Get-Date).AddYears(1) `
            -TextExtension @("2.5.29.19={text}false","2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.14={text}")
          
          $pwd = ConvertTo-SecureString -String "Test1234!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "XboxWin32RunnerTest.pfx" -Password $pwd
          Export-Certificate -Cert $cert -FilePath "XboxWin32RunnerTest.cer"
          
          # Trust the certificate
          Import-Certificate -FilePath "XboxWin32RunnerTest.cer" -CertStoreLocation "Cert:\LocalMachine\TrustedPeople"
          Write-Host "Certificate created and trusted: $($cert.Thumbprint)"
          
          # Update the vcxproj to use this certificate
          $vcxproj = Get-Content "XboxWin32Runner.vcxproj" -Raw
          if ($vcxproj -match '<PackageCertificateKeyFile>') {
            $vcxproj = $vcxproj -replace '<PackageCertificateKeyFile>.*?</PackageCertificateKeyFile>', "<PackageCertificateKeyFile>XboxWin32RunnerTest.pfx</PackageCertificateKeyFile>"
          } else {
            $vcxproj = $vcxproj -replace '</PropertyGroup>', "  <PackageCertificateKeyFile>XboxWin32RunnerTest.pfx</PackageCertificateKeyFile>`n  </PropertyGroup>"
          }
          if ($vcxproj -match '<PackageCertificateThumbprint>') {
            $vcxproj = $vcxproj -replace '<PackageCertificateThumbprint>.*?</PackageCertificateThumbprint>', "<PackageCertificateThumbprint>$($cert.Thumbprint)</PackageCertificateThumbprint>"
          } else {
            $vcxproj = $vcxproj -replace '</PropertyGroup>', "  <PackageCertificateThumbprint>$($cert.Thumbprint)</PackageCertificateThumbprint>`n  </PropertyGroup>"
          }
          if ($vcxproj -match '<PackageCertificatePassword>') {
            $vcxproj = $vcxproj -replace '<PackageCertificatePassword>.*?</PackageCertificatePassword>', "<PackageCertificatePassword>Test1234!</PackageCertificatePassword>"
          } else {
            $vcxproj = $vcxproj -replace '</PropertyGroup>', "  <PackageCertificatePassword>Test1234!</PackageCertificatePassword>`n  </PropertyGroup>"
          }
          Set-Content "XboxWin32Runner.vcxproj" -Value $vcxproj
          Write-Host "vcxproj updated with certificate"

      - name: Create solution file
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          # VS needs a .sln to build a .vcxproj. Create a minimal one.
          $slnContent = @"
          Microsoft Visual Studio Solution File, Format Version 12.00
          # Visual Studio Version 17
          VisualStudioVersion = 17.0.31903.59
          MinimumVisualStudioVersion = 10.0.40219.1
          Project("{8BC9CEB8-8B4A-11D0-8D11-00A0C91BC942}") = "XboxWin32Runner", "XboxWin32Runner.vcxproj", "{00000000-0000-0000-0000-000000000001}"
          EndProject
          Global
            GlobalSection(SolutionConfigurationPlatforms) = preSolution
              Debug|x64 = Debug|x64
              Release|x64 = Release|x64
            EndGlobalSection
            GlobalSection(ProjectConfigurationPlatforms) = postSolution
              {00000000-0000-0000-0000-000000000001}.Debug|x64.ActiveCfg = Debug|x64
              {00000000-0000-0000-0000-000000000001}.Debug|x64.Build.0 = Debug|x64
              {00000000-0000-0000-0000-000000000001}.Release|x64.ActiveCfg = Release|x64
              {00000000-0000-0000-0000-000000000001}.Release|x64.Build.0 = Release|x64
            EndGlobalSection
          EndGlobal
          "@
          Set-Content -Path "XboxWin32Runner.sln" -Value $slnContent -Encoding UTF8

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          nuget restore XboxWin32Runner.sln 2>&1 | Out-Null
          Write-Host "NuGet restore complete"

      - name: Generate properly-sized PNG assets
        shell: pwsh
        run: |
          $assetsDir = "${{ github.workspace }}\uwp-shell\Assets"
          if (!(Test-Path $assetsDir)) { New-Item -ItemType Directory -Path $assetsDir -Force }
          Add-Type -AssemblyName System.Drawing
          $sizes = @{
            "Square150x150Logo.png" = @(150, 150)
            "Square44x44Logo.png" = @(44, 44)
            "Wide310x150Logo.png" = @(310, 150)
            "StoreLogo.png" = @(50, 50)
            "SplashScreen.png" = @(620, 300)
            "LockScreenLogo.png" = @(24, 24)
          }
          foreach ($name in $sizes.Keys) {
            $w = $sizes[$name][0]
            $h = $sizes[$name][1]
            $path = Join-Path $assetsDir $name
            $bmp = New-Object System.Drawing.Bitmap($w, $h)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::Black)
            $bmp.Save($path, [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose()
            $bmp.Dispose()
            $info = [System.Drawing.Image]::FromFile($path)
            Write-Host "Created $name ($w x $h) — actual: $($info.Width) x $($info.Height)"
            $info.Dispose()
          }

      - name: Build (Debug x64)
        shell: pwsh
        run: |
          cd ${{ github.workspace }}\uwp-shell
          msbuild XboxWin32Runner.vcxproj /p:Configuration=Debug /p:Platform=x64 /m /v:minimal 2>&1 | Tee-Object -FilePath build_debug.log
          $exitCode = $LASTEXITCODE
          Write-Host "MSBuild exit code: $exitCode"
          Get-Content build_debug.log -Tail 80
          exit $exitCode

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: uwp-shell/build_debug.log

      - name: Upload appx (always, even if test fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: XboxWin32Runner-appx
          path: |
            uwp-shell/x64/Debug/XboxWin32Runner.appx
            uwp-shell/x64/Debug/XboxWin32Runner.exe
            uwp-shell/AppPackages/
            uwp-shell/XboxWin32RunnerTest.cer
          if-no-files-found: ignore

      - name: Run UWP app in test mode and capture results
        shell: pwsh
        continue-on-error: true
        run: |
          # Install the appx and run it in test mode
          # The appx is in AppPackages/
          $appxDir = Get-ChildItem -Path "uwp-shell\AppPackages" -Recurse -Filter "*.msix" | Select-Object -First 1
          if ($appxDir) {
            Write-Host "Found MSIX: $($appxDir.FullName)"
            # Install it
            Add-AppxPackage -Path $appxDir.FullName -ForceApplicationShutdown
            Write-Host "Package installed"
            
            # Wait a moment for the app to launch (UWP apps auto-launch on install
            # if they have a startup task, but we need to launch it manually)
            Start-Process -FilePath "explorer.exe" -ArgumentList "shell:AppsFolder\Zai.XboxWin32Runner_!App"
            Write-Host "App launched"
            
            # Wait for the app to finish writing test results
            Start-Sleep -Seconds 10
            
            # Find the LocalState folder
            $pkgPath = (Get-AppxPackage -Name "*XboxWin32Runner*").PackageFamilyName
            $localState = "$env:LOCALAPPDATA\Packages\$pkgPath\LocalState"
            Write-Host "Looking for results in: $localState"
            
            if (Test-Path "$localState\shim_test_results.txt") {
              Write-Host "=== SHIM TEST RESULTS ==="
              Get-Content "$localState\shim_test_results.txt"
              Copy-Item "$localState\shim_test_results.txt" -Destination "shim_test_results.txt"
            } else {
              Write-Host "No shim_test_results.txt found — app may have crashed"
              # Check if there's any file in LocalState
              if (Test-Path $localState) {
                Write-Host "Files in LocalState:"
                Get-ChildItem $localState -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
              }
            }
          } else {
            Write-Host "No MSIX found"
          }

      - name: Upload shim test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shim-test-results
          path: shim_test_results.txt
          if-no-files-found: ignore
